# Image classification config
# Overrides default.yaml for image modality

modality: "image"

data:
  dataset_name: "TBD"       # e.g. "cifar100", "food101", "flowers102"
  image_size: 224
  batch_size: 64
  augmentation:
    random_horizontal_flip: true
    random_resized_crop: true
    color_jitter: true
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

models:
  cnn:
    name: "resnet50"        # or "resnet101", "efficientnet_b0", etc.
    pretrained: true
    freeze_backbone: false
  vit:
    name: "vit_base_patch16_224"
    pretrained: true
    freeze_backbone: false

training:
  epochs: 30
  learning_rate: 1.0e-4
