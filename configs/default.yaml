# =============================================
# Default training configuration for Assignment 1
# Override per-modality in image.yaml, text.yaml, multimodal.yaml
# =============================================

# --- General ---
seed: 42
device: "cuda"           # "cuda" or "cpu"
num_workers: 4
pin_memory: true

# --- Data ---
data:
  batch_size: 32
  val_split: 0.15
  test_split: 0.15
  augmentation: true

# --- Training ---
training:
  epochs: 30
  optimizer: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  scheduler: "cosine"     # "cosine", "step", "plateau"
  warmup_epochs: 3
  early_stopping:
    patience: 5
    min_delta: 0.001

# --- Logging ---
logging:
  log_dir: "outputs/logs"
  save_dir: "outputs/checkpoints"
  log_every_n_steps: 50
  save_top_k: 3
  tensorboard: true
