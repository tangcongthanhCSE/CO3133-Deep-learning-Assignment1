services:
  - type: web
    name: dl-inference-api
    runtime: python
    plan: free

    # Build: install Python dependencies
    buildCommand: pip install -r requirements.txt

    # Start: launch FastAPI via uvicorn on Render's dynamic port
    startCommand: uvicorn extensions.app_demo.main:app --host 0.0.0.0 --port $PORT

    # Health check endpoint
    healthCheckPath: /api/health

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
